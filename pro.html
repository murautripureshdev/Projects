<!DOCTYPE html>
<html>
<head>
<title>Pro Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:95%;
    max-width:400px;
}

.calculator{
    background:#1e1e1e;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 20px black;
}

#display{
    width:100%;
    height:60px;
    font-size:22px;
    text-align:right;
    padding-right:10px;
    margin-bottom:10px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

button{
    padding:15px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

.operator{ background:#ff9500; color:white; }
.equal{ background:#28a745; color:white; }
.clear{ background:#dc3545; color:white; }

.history{
    background:#111;
    color:white;
    margin-top:15px;
    padding:10px;
    border-radius:10px;
    max-height:150px;
    overflow-y:auto;
    font-size:14px;
}

.history h3{
    margin:5px 0;
    font-size:16px;
}

@media(max-width:400px){
    button{
        padding:12px;
        font-size:14px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="calculator">
<input type="text" id="display" disabled>

<div class="buttons">
<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="backspace()">⌫</button>
<button onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">/</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">*</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">-</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="sqrt()">√</button>
<button class="equal" onclick="calculate()">=</button>
</div>
</div>

<div class="history">
<h3>History</h3>
<div id="historyList"></div>
<button onclick="clearHistory()" style="margin-top:5px;width:100%;">Clear History</button>
</div>

</div>

<script>

let display = document.getElementById("display");
let historyList = document.getElementById("historyList");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function backspace(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        let expression = display.value;
        let result = eval(expression);
        display.value = result;
        addToHistory(expression + " = " + result);
    }catch{
        display.value = "Error";
    }
}

function sqrt(){
    try{
        let expression = display.value;
        let result = Math.sqrt(eval(expression));
        display.value = result;
        addToHistory("√(" + expression + ") = " + result);
    }catch{
        display.value = "Error";
    }
}

function addToHistory(text){
    let div = document.createElement("div");
    div.textContent = text;
    historyList.prepend(div);
}

function clearHistory(){
    historyList.innerHTML = "";
}

document.addEventListener("keydown", function(e){
    if(!isNaN(e.key) || "+-*/.%".includes(e.key)){
        append(e.key);
    }
    if(e.key === "Enter"){
        calculate();
    }
    if(e.key === "Backspace"){
        backspace();
    }
});

</script>

</body>
</html>
